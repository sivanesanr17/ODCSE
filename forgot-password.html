<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ODCSE</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <img src="Images/ODCSE Logo.png" alt="ODCSE Logo" class="logo">
        <form id="forgot-password-form">
            <h2>Forgot Password</h2>
            <p>Enter your college email to receive an OTP.</p>
            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" id="forgot-email" placeholder="College Mail ID" required autocomplete="off">
            </div>
            <div>
                <button type="submit">Get OTP</button>
            </div>
            <p id="forgot-password-error" class="error-message"></p>
            <p><a href="index.html">Back to Login</a></p>
        </form>
    </div>
    <script src="forgot-password.js"></script>
</body>
</html>
