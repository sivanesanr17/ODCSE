<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODCSE Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <img src="Images/ODCSE Logo.png" alt="ODCSE Logo" class="logo">
        <form id="login-form">
            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="College Mail ID" required autocomplete="off">
            </div>
            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="forgot-password">
                <a href="forgot-password.html">Forget Password?</a>
            </div>
            <div>
                <button type="submit">Login</button>
            </div>
            <p id="error-message" class="error-message"></p>        
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
